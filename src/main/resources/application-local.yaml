server:
    port: 8080

app:
    health:
        directory: /health
    nextcloud:
        url: ${NEXTCLOUD_URL:http://localhost}
        username: ${NEXTCLOUD_USERNAME:admin}
        token: ${NEXTCLOUD_TOKEN:changeme}
        dav-path: /remote.php/dav/files/

spring:
    application:
        name: ms-recopilador
    datasource:
        url: ${DB_URL}
        username: ${DB_USERNAME}
        password: ${DB_PASSWORD}
        driver-class-name: org.mariadb.jdbc.Driver

    jpa:
        database-platform: org.hibernate.dialect.MariaDBDialect
        hibernate:
            ddl-auto: update
        show-sql: false